#NaALwokbY62y1000
- iterations: 1000
  algorithm:
    name: PersistentES
    population: 1024
    opt_name: adam
    lrate_init: 0.01
    lrate_decay: 0.999
    lrate_limit: 0.001
    mean_decay: 0.0
    w_decay: 0.0
    fitness_trafo: centered_rank
    sigma_init: 0.04
    sigma_decay: 0.999
    sigma_limit: 0.01
    T: 100
    K: 10
    init_min: 0.0
    init_max: 0.0
    clip_min: null
    clip_max: null
  env:
    name: Humanoid
    episode_length: 1000
    physics_backend: spring
  network:
    name: MLP
    layers: 64~64~64~64
    hidden_activation: tanh
    output_activation: tanh
  train:
    test_interval: 25
    n_tests: 128
    normalization: true
  log:
    log_interval: 1
    log_save: true
    save_test: true
    save_train: false
    save_train_interval: 50
    save_population: false
    save_rewards: false
    save_env: false
    visualize_final_env: true
    visualize_test_envs: true
    visualize_train_envs: false
  seed: 12
