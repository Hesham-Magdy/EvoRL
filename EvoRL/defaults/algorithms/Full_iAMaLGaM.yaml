-
  algorithm:
    #(Iterative) AMaLGaM (Bosman et al., 2013) - Full Covariance
    #Reference: https://tinyurl.com/y9fcccx2
    #https://github.com/RobertTLange/evosax/blob/main/evosax/strategies/full_iamalgam.py
    name: Full_iAMaLGaM
    population: 100
    elite_ratio: 0.35
    #eta_avs_inc: 1.1111112 # 1.0/0.9
    eta_avs_dec: 0.9
    nis_max_gens: 50
    delta_ams: 2.0
    theta_sdr: 1.0
    c_mult_init: 1.0
    sigma_init: 0.0
    sigma_decay: 0.99
    sigma_limit: 0.0
    mean_decay: 0.0
    w_decay: 0.0 #Reduce fitness based on L2 norm of parameters
    fitness_trafo: centered_rank #[centered_rank, z_score, norm_range, raw]
    #centered_rank -> Return ~ -0.5 to 0.5 centered ranks (best to worst - min!)
    #z_score -> Make fitness 'Gaussian' by substracting mean and dividing by std
    #norm_range -> Map scores into a min/max range (-1.0, 1.0)
    init_min: 0.0
    init_max: 0.0
    clip_min: null
    clip_max: null
