-
  algorithm:
    #ASEBO (Choromanski et al., 2019)
    #Reference: https://arxiv.org/abs/1903.04268
    #https://github.com/RobertTLange/evosax/blob/main/evosax/strategies/asebo.py
    name: ASEBO
    population: 100 #even
    subspace_dims: 50
    grad_decay: 0.99
    sigma_init: 0.03
    sigma_decay: 1.0
    sigma_limit: 0.01
    opt_name: adam #["sgd", "adam", "rmsprop", "clipup", "adan"]
    lrate_init: 0.05
    lrate_decay: 1.0
    lrate_limit: 0.001
    mean_decay: 0.0
    w_decay: 0.0 #Reduce fitness based on L2 norm of parameters
    fitness_trafo: centered_rank #[centered_rank, z_score, norm_range, raw]
    #centered_rank -> Return ~ -0.5 to 0.5 centered ranks (best to worst - min!)
    #z_score -> Make fitness 'Gaussian' by substracting mean and dividing by std
    #norm_range -> Map scores into a min/max range (-1.0, 1.0)
    init_min: 0.0
    init_max: 0.0
    clip_min: null
    clip_max: null
