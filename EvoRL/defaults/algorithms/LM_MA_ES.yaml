-
  algorithm:
    #Limited Memory MA-ES (Loshchilov et al., 2017)
    #Reference: https://arxiv.org/pdf/1705.06693.pdf
    #https://github.com/RobertTLange/evosax/blob/main/evosax/strategies/lm_ma_es.py
    name: LM_MA_ES
    population: 100
    elite_ratio: 0.5
    memory_size: 10
    c_m: 1.0
    sigma_init: 1.0
    mean_decay: 0.0
    w_decay: 0.0 #Reduce fitness based on L2 norm of parameters
    fitness_trafo: centered_rank #[centered_rank, z_score, norm_range, raw]
    #centered_rank -> Return ~ -0.5 to 0.5 centered ranks (best to worst - min!)
    #z_score -> Make fitness 'Gaussian' by substracting mean and dividing by std
    #norm_range -> Map scores into a min/max range (-1.0, 1.0)
    init_min: 0.0
    init_max: 0.0
    clip_min: null
    clip_max: null
