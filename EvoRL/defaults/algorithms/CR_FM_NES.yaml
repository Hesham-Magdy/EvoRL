-
  algorithm:
    #Cost-Reduced Fast-Moving Natural ES (Nomura & Ono, 2022)
    #Reference: https://arxiv.org/abs/2201.11422
    #https://github.com/RobertTLange/evosax/blob/main/evosax/strategies/cr_fm_nes.py
    name: CR_FM_NES
    population: 100
    lrate_mean: 1.0
    sigma_init: 1.0
    mean_decay: 0.0
    w_decay: 0.0 #Reduce fitness based on L2 norm of parameters
    fitness_trafo: centered_rank #[centered_rank, z_score, norm_range, raw]
    #centered_rank -> Return ~ -0.5 to 0.5 centered ranks (best to worst - min!)
    #z_score -> Make fitness 'Gaussian' by substracting mean and dividing by std
    #norm_range -> Map scores into a min/max range (-1.0, 1.0)
    init_min: 0.0
    init_max: 0.0
    clip_min: null
    clip_max: null
    #lrate_move_sigma: 0.1 #internally computed
    #lrate_stag_sigma: 0.1 #internally computed
    #lrate_conv_sigma: 0.1 #internally computed
    #lrate_B: 0.1 #internally computed 
