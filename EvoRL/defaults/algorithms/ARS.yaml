-
  algorithm:
    #Augmented Random Search (Mania et al., 2018)
    #Reference: https://arxiv.org/pdf/1803.07055.pdf
    #https://github.com/RobertTLange/evosax/blob/main/evosax/strategies/ars.py
    name: ARS
    population: 100 #even
    elite_ratio: 1.0
    sigma_init: 0.04
    sigma_decay: 0.999
    sigma_limit: 0.01
    opt_name: adam #["sgd", "adam", "rmsprop", "clipup", "adan"]
    lrate_init: 0.01
    lrate_decay: 0.999
    lrate_limit: 0.001
    mean_decay: 0.0
    w_decay: 0.0 #Reduce fitness based on L2 norm of parameters
    fitness_trafo: centered_rank #[centered_rank, z_score, norm_range, raw]
    #centered_rank -> Return ~ -0.5 to 0.5 centered ranks (best to worst - min!)
    #z_score -> Make fitness 'Gaussian' by substracting mean and dividing by std
    #norm_range -> Map scores into a min/max range (-1.0, 1.0)
    init_min: 0.0
    init_max: 0.0
    clip_min: null
    clip_max: null
