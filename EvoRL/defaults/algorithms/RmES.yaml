-
  algorithm:
    #Rank-m ES (Li & Zhang, 2017)
    #Reference: https://ieeexplore.ieee.org/document/8080257
    #https://github.com/RobertTLange/evosax/blob/main/evosax/strategies/rm_es.py
    name: RmES
    population: 100
    elite_ratio: 0.5
    memory_size: 10
    c_m: 1.0
    c_s: 0.3
    d_sigma: 1.0
    t_uncorr: 20
    q_star: 0.325
    sigma_init: 1.0
    sigma_limit: 0.001
    mean_decay: 0.0
    w_decay: 0.0 #Reduce fitness based on L2 norm of parameters
    fitness_trafo: centered_rank #[centered_rank, z_score, norm_range, raw]
    #centered_rank -> Return ~ -0.5 to 0.5 centered ranks (best to worst - min!)
    #z_score -> Make fitness 'Gaussian' by substracting mean and dividing by std
    #norm_range -> Map scores into a min/max range (-1.0, 1.0)
    init_min: 0.0
    init_max: 0.0
    clip_min: null
    clip_max: null
